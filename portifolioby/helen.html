<!DOCTYPE html>
<html lang="pt-br">

<head>
  <link rel="icon" type="image/png" href="favicon2.ico">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dra. Helen Melo</title>

<link rel="stylesheet" href="style.css">

<style>

.perfil{
text-align:center;
padding:80px 20px;
}

.perfil img{
width:280px;
border-radius:12px;
margin-bottom:20px;
border:2px solid #c9a96e;
}

.perfil h1{
color:#c9a96e;
}

.bio{
max-width:700px;
margin:auto;
color:#bbb;
line-height:1.6;
}

.artigos{
padding:80px 20px;
text-align:center;
background:#111;
}

.artigos h2{
color:#c9a96e;
margin-bottom:40px;
}

.lista-artigos{
display:flex;
flex-direction:column;
gap:20px;
max-width:600px;
margin:auto;
}

.artigo-btn{

display:block;
padding:18px;

background:#0b0b0b;

border:1px solid rgba(201,169,110,0.4);

border-radius:10px;

color:white;

text-decoration:none;

font-size:18px;

transition:0.3s;

}

.artigo-btn:hover{

background:#c9a96e;
color:black;

transform:translateY(-3px);

}

</style>

</head>

<body>



<section class="perfil">

<img src="foto2.jpg" alt="Dra Helen Melo">

<h1>Dra. Helen Melo</h1>

<p class="bio">

Advogada com atuação em Direito Imobiliário e Direito Condominial,
prestando assessoria jurídica especializada para condomínios,
síndicos e administradoras.

</p>

</section>



</body>
</html>
